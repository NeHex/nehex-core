services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nehex-core
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      ADMIN_MANAGER_BUILD_ON_STARTUP: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${APP_PORT:-7878}:7878"
    networks:
      - nehex-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7878/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 6

  mysql:
    image: mysql:8.4
    container_name: nehex-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-nehex_dtbs}
      MYSQL_USER: ${DB_USER:-nehex_dtbs}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - nehex-internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    container_name: nehex-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis-data:/data
    networks:
      - nehex-internal

networks:
  nehex-internal:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
