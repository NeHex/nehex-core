services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: "${PIP_INDEX_URL:-https://mirrors.ustc.edu.cn/pypi/simple}"
    container_name: nehex-core
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      ADMIN_MANAGER_BUILD_ON_STARTUP: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${APP_PORT:-7878}:7878"
    volumes:
      - backend-storage:/app/storage
      - backend-backups:/app/backups
    networks:
      - nehex-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7878/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 6

  postgres:
    image: postgres:16-alpine
    container_name: nehex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nehex_dtbs}
      POSTGRES_USER: ${DB_USER:-nehex_dtbs}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nehex-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    container_name: nehex-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis-data:/data
    networks:
      - nehex-internal

networks:
  nehex-internal:
    driver: bridge

volumes:
  backend-storage:
  backend-backups:
  postgres-data:
  redis-data:
