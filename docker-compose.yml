services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKERHUB_MIRROR: ${DOCKERHUB_MIRROR:-registry.cn-hangzhou.aliyuncs.com}
    container_name: nehex-core
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      ADMIN_MANAGER_BUILD_ON_STARTUP: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${APP_PORT:-7878}:7878"
    volumes:
      - nehex-core-storage:/app/storage
      - nehex-core-backups:/app/backups
    networks:
      - nehex-core-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7878/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6

  postgres:
    image: ${POSTGRES_IMAGE:-registry.cn-hangzhou.aliyuncs.com/library/postgres:16-alpine}
    container_name: nehex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nehex_dtbs}
      POSTGRES_USER: ${DB_USER:-nehex_dtbs}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - nehex-core-postgres-data:/var/lib/postgresql/data
    networks:
      - nehex-core-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: ${REDIS_IMAGE:-registry.cn-hangzhou.aliyuncs.com/library/redis:7.2-alpine}
    container_name: nehex-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - nehex-core-redis-data:/data
    networks:
      - nehex-core-network

networks:
  nehex-core-network:
    name: Nehex-Core
    driver: bridge

volumes:
  nehex-core-storage:
    name: Nehex-Core-storage
  nehex-core-backups:
    name: Nehex-Core-backups
  nehex-core-postgres-data:
    name: Nehex-Core-postgres-data
  nehex-core-redis-data:
    name: Nehex-Core-redis-data
